<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo List</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">&#26032;&#35215;&#30331;&#37682;</a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th scope="col" class="px-3">ID</th>
                    <th scope="col">&#12479;&#12452;&#12488;&#12523;</th>
                    <th scope="col" class="text-center">&#23436;&#20102;&#29366;&#24907;</th>
                    <th scope="col" class="text-center">&#25805;&#20316;</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td class="px-3" th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">Sample Title</td>
                    <td class="text-center" th:text="${todo.completed} ? '&#23436;&#20102;' : '&#26410;&#23436;&#20102;'">&#26410;&#23436;&#20102;</td>
                    <td class="text-center">
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline" onsubmit="return confirm('\u672c\u5f53\u306b\u524a\u9664\u3057\u307e\u3059\u304b\uff1f');">
                            <button type="submit" class="btn btn-danger btn-sm">&#21066;&#38500;</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="4" class="text-center py-4 text-muted">No ToDo items.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
